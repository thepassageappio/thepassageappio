name: Passage candidate validation

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened, edited, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: passage-candidate-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  candidate-validation:
    name: Passage CI / candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate without persisted credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Check release train structure
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_ACTION: ${{ github.event.action }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-release-train.js
      - name: Block internal narration on persona surfaces
        run: node scripts/check-persona-language.js

  independent-qa:
    name: Passage CI / governance-fixtures
    needs: candidate-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate without persisted credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Run adversarial governance fixtures
        run: node scripts/test-release-governance.js

  legacy-candidate-bridge:
    name: Validate candidate governance and language
    needs: [candidate-validation, independent-qa]
    runs-on: ubuntu-latest
    steps:
      - run: echo "New candidate and QA checks passed."
