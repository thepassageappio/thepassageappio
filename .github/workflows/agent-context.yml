name: Agent release train guard

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

jobs:
  agent-context:
    name: Require agent context and release train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine diff base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "AGENT_CONTEXT_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "AGENT_CONTEXT_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
          fi
      - name: Check agent context loop
        run: node scripts/check-agent-context.js
      - name: Check release train PR handoff
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-release-train.js
