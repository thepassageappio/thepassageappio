<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Passage">

  
  <defs>
    <style>
      .held-drift {
        transform-origin: 430px 540px;
        animation: heldDrift 7.5s ease-in-out infinite;
      }
      .held-breath {
        transform-origin: 650px 440px;
        animation: heldBreath 5.8s ease-in-out infinite;
      }
      @keyframes heldDrift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(-8px, 6px, 0) scale(1.015); }
      }
      @keyframes heldBreath {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(7px, -6px, 0) scale(1.025); }
      }
      @media (prefers-reduced-motion: reduce) {
        .held-drift, .held-breath { animation: none; }
      }
    </style>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#faf6ec"></stop>
      <stop offset="100%" stop-color="#ece3d1"></stop>
    </radialGradient>
    <radialGradient id="bigGrad" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#3a322c"></stop>
      <stop offset="100%" stop-color="#15110e"></stop>
    </radialGradient>
    <radialGradient id="smallGrad" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#f3c089"></stop>
      <stop offset="100%" stop-color="#b8783a"></stop>
    </radialGradient>
    <clipPath id="sq"><path d="M 512 0 C 850 0 1024 174 1024 512 C 1024 850 850 1024 512 1024 C 174 1024 0 850 0 512 C 0 174 174 0 512 0 Z"></path></clipPath>
  </defs>
  <path d="M 512 0 C 850 0 1024 174 1024 512 C 1024 850 850 1024 512 1024 C 174 1024 0 850 0 512 C 0 174 174 0 512 0 Z" fill="url(#bgGrad)"></path>
  <g clip-path="url(#sq)">
    <g class="held-drift">
      <circle cx="430" cy="540" r="270" fill="url(#bigGrad)"></circle>
    </g>
    <g class="held-breath">
      <circle cx="650" cy="440" r="180" fill="url(#smallGrad)"></circle>
      <ellipse cx="600" cy="395" rx="40" ry="18" fill="#fff3d8" opacity="0.4"></ellipse>
    </g>
  </g>
</svg>
